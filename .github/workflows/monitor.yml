name: Monitor Generalitat

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Buscar y notificar
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RESULT1=$(curl -s "https://html.duckduckgo.com/html/?q=listas+pedagogia+generalitat+Catalunya+2025+convocatoria" \
            -H "User-Agent: Mozilla/5.0" | \
            grep -o '<a class="result__a"[^>]*>[^<]*</a>' | \
            sed 's/<[^>]*>//g' | head -5)

          RESULT2=$(curl -s "https://html.duckduckgo.com/html/?q=vetlladoras+generalitat+Catalunya+convocatoria+2025" \
            -H "User-Agent: Mozilla/5.0" | \
            grep -o '<a class="result__a"[^>]*>[^<]*</a>' | \
            sed 's/<[^>]*>//g' | head -5)

          FECHA=$(date '+%d/%m/%Y')

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=Monitor Generalitat - ${FECHA}%0A%0APedagogia:%0A${RESULT1}%0A%0AVetlladoras:%0A${RESULT2}%0A%0AComprova: gencat.cat"
