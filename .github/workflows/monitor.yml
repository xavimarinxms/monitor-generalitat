name: Monitor Generalitat

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Buscar y notificar
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s "https://html.duckduckgo.com/html/?q=listas+pedagogia+generalitat+Catalunya+2025" \
            -H "User-Agent: Mozilla/5.0" | \
            grep -o '<a class="result__a"[^>]*>[^<]*</a>' | \
            sed 's/<[^>]*>//g' | head -3 > /tmp/result1.txt

          curl -s "https://html.duckduckgo.com/html/?q=vetlladoras+generalitat+Catalunya+2025" \
            -H "User-Agent: Mozilla/5.0" | \
            grep -o '<a class="result__a"[^>]*>[^<]*</a>' | \
            sed 's/<[^>]*>//g' | head -3 > /tmp/result2.txt

          FECHA=$(date '+%d/%m/%Y')
          R1=$(cat /tmp/result1.txt | tr '\n' ' ')
          R2=$(cat /tmp/result2.txt | tr '\n' ' ')

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=Monitor Generalitat - ${FECHA} | Pedagogia: ${R1} | Vetlladoras: ${R2}"
