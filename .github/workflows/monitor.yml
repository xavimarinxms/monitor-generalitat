name: Monitor Generalitat

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Buscar i notificar
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s "https://educacio.gencat.cat/ca/serveis-tramits/treballa-amb-nosaltres/borses-treball/personal-interi-docent/incorporacio-borsa/" -H "User-Agent: Mozilla/5.0" > /tmp/p1.txt
          curl -s "https://educacio.gencat.cat/ca/serveis-tramits/treballa-amb-nosaltres/borses-treball/" -H "User-Agent: Mozilla/5.0" > /tmp/p2.txt
          curl -s "https://www.sindicat.net/borsa-personal-docent/" -H "User-Agent: Mozilla/5.0" > /tmp/p3.txt

          ORI=$(cat /tmp/p1.txt /tmp/p3.txt | grep -i "orientaci\|PSI\|oberta\|convocatoria\|llista" | sed 's/<[^>]*>//g' | tr -s ' ' | head -1)
          VET=$(cat /tmp/p2.txt | grep -i "vetll\|educador.*especial\|EEE\|oberta\|convocatoria" | sed 's/<[^>]*>//g' | tr -s ' ' | head -1)

          FECHA=$(date '+%d/%m/%Y')

          if [ -z "$ORI" ]; then
            ORI_MSG="Sense novetats"
          else
            ORI_MSG="${ORI} - https://educacio.gencat.cat/ca/serveis-tramits/treballa-amb-nosaltres/borses-treball/personal-interi-docent/incorporacio-borsa/"
          fi

          if [ -z "$VET" ]; then
            VET_MSG="Sense novetats"
          else
            VET_MSG="${VET} - https://educacio.gencat.cat/ca/serveis-tramits/treballa-amb-nosaltres/borses-treball/"
          fi

          MSG="Monitor ${FECHA}
Orientadora: ${ORI_MSG}
Vetlladora: ${VET_MSG}"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}"
