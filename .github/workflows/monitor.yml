name: Monitor Generalitat

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Buscar y notificar
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          R1=$(curl -s "https://educacio.gencat.cat/ca/arees-actuacio/professors/oposicions/" \
            -H "User-Agent: Mozilla/5.0" | \
            grep -i "pedagog\|llista\|borsa" | \
            sed 's/<[^>]*>//g' | tr -s ' ' | head -3)

          R2=$(curl -s "https://educacio.gencat.cat/ca/arees-actuacio/professors/oposicions/" \
            -H "User-Agent: Mozilla/5.0" | \
            grep -i "vetll" | \
            sed 's/<[^>]*>//g' | tr -s ' ' | head -3)

          FECHA=$(date '+%d/%m/%Y')

          if [ -z "$R1" ]; then R1="Sense novetats"; fi
          if [ -z "$R2" ]; then R2="Sense novetats"; fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=v3 - Monitor Generalitat - ${FECHA} | Pedagogia: ${R1} | Vetlladoras: ${R2}"
